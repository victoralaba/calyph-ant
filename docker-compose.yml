# docker-compose.yml
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - POOLING_ENABLED=true
      - POOL_MIN_SIZE=5
      - POOL_MAX_SIZE=20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    # Production: Utilize the 4 oCPUs
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
    # Standard queue: Restricted to 2 concurrent processes
    command: celery -A worker.celery celery_app worker --loglevel=info -Q default,keep_alive,backups,maintenance -c 2

  worker_ephemeral:
    build:
      context: .
      dockerfile: Dockerfile
    user: root # SECURITY FIX: Required for dynamic docker.sock orchestration
    env_file: .env
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
    # Ephemeral queue: Restricted to 2 concurrent processes to prevent host starvation
    command: celery -A worker.celery celery_app worker --loglevel=info -Q ephemeral_compute -c 2

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - redis
    command: celery -A worker.celery celery_app beat --loglevel=info

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # BUG FIX: dynamically evaluate POSTGRES_USER
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    # ARCHITECTURE UPDATE: Tuned specifically for 24GB Host RAM
    command: >
      postgres
        -c max_connections=150
        -c shared_buffers=6GB
        -c effective_cache_size=16GB
        -c maintenance_work_mem=1GB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=32MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=32MB

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: