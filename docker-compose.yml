# docker-compose.yml
version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override dev defaults for containerised runs
      - POOLING_ENABLED=true
      - POOL_MIN_SIZE=2
      - POOL_MAX_SIZE=10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    # 4 workers: adjust to 2 × CPU cores in production
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - POOLING_ENABLED=true
      - POOL_MIN_SIZE=1
      - POOL_MAX_SIZE=5
    depends_on:
      - postgres
      - redis
    command: celery -A worker.celery celery_app worker --loglevel=info -Q default,keep_alive,backups,maintenance

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - redis
    command: celery -A worker.celery celery_app beat --loglevel=info

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: calyphant
      POSTGRES_PASSWORD: password
      POSTGRES_DB: calyphant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # max_connections: set to (api_workers × pool_max_size) + celery_workers + headroom
    # 4 api workers × 10 pool = 40, + 5 celery + 15 headroom = 60
    # In production bump this to 200 if using multiple replicas
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calyphant"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Enable persistence so pub/sub inflight messages survive brief restarts
    command: >
      redis-server
        --save 60 1
        --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
