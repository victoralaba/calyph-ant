# docker-compose.yml

x-shared-env: &shared-env
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis:6379/2"
  # Ensures the API and workers hit the postgres container, not localhost
  DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
  SYNC_DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      <<: *shared-env
      POOLING_ENABLED: "true"
      POOL_MIN_SIZE: "5"
      POOL_MAX_SIZE: "20"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      <<: *shared-env
    depends_on:
      - postgres
      - redis
    command: celery -A worker.celery:celery_app worker --loglevel=info -Q default,keep_alive,backups,maintenance -c 2

  worker_ephemeral:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    env_file: .env
    environment:
      <<: *shared-env
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
      - redis
    command: celery -A worker.celery:celery_app worker --loglevel=info -Q ephemeral_compute -c 2

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      <<: *shared-env
    depends_on:
      - redis
    command: celery -A worker.celery:celery_app beat --loglevel=info

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # ARCHITECTURE FIX: Direct interpolation and explicit database targeting
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 45s
    # ARCHITECTURE UPDATE: Tuned specifically for 24GB Host RAM
    command: >
      postgres
        -c max_connections=150
        -c shared_buffers=6GB
        -c effective_cache_size=16GB
        -c maintenance_work_mem=1GB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=32MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=32MB

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: